<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Website Video</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
        }
        video {
            width: 100%;
            max-height: 400px;
            margin-top: 20px;
        }
        input {
            margin-top: 20px;
        }
        .ads {
            margin: 20px;
            padding: 10px;
            background: #222;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>?? Website Nonton Video</h1>

    <!-- Upload Video -->
    <input type="file" id="upload" accept="video/*">

    <!-- Video Player -->
    <video id="player" controls></video>

    <!-- Tempat Iklan Adsterra -->
    <div class="ads">
        <p>Tempat Iklan</p>

        <!-- GANTI DENGAN SCRIPT ADSTERRA -->
        <script type="text/javascript">
            // paste kode iklan dari Adsterra di sini
        </script>
    </div>

</div>

<script>
    const upload = document.getElementById('upload');
    const player = document.getElementById('player');

    upload.addEventListener('change', function() {
        const file = this.files[0];
        const url = URL.createObjectURL(file);
        player.src = url;
    });
</script>

</body>
</html>
